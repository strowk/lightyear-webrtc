name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (library)
        run: cargo clippy -- -D warnings

  test:
    name: Tests (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["--all-features", "--features client", "--features server", ""]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test ${{ matrix.features }}

  build-example:
    name: Build example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.121

      - name: Build example
        working-directory: examples/webrtc_pong
        run: bash build_web.sh release
