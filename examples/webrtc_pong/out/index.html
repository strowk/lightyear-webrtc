<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WebRTC Pong - Lightyear</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100vw !important; height: 100vh !important; display: block; }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #ccc; font-family: monospace; text-align: center; z-index: 10; font-size: 13px;
        }
        .info a { color: #4fc3f7; }
    </style>
</head>
<body>
    <canvas id="bevy-canvas"></canvas>
    <div class="info">
        <a href="?host">Host</a> | <a href="?client">Client</a> | Arrow keys to move
    </div>
    <script type="module">
        import init from "./webrtc_pong.js";
        init().catch((error) => {
            if (!error.message.startsWith("Using exceptions for control flow")) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
